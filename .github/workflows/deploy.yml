name: 🚀 Deploy to VPS

on:
  # Manual trigger with dropdown
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  version-and-deploy:
    name: Bump v${{ github.event.inputs.bump_type }} & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version
        id: version
        run: |
          BUMP_TYPE="${{ github.event.inputs.bump_type }}"
          CURRENT=$(cat version.txt | tr -d '[:space:]')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if [ "$BUMP_TYPE" = "major" ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [ "$BUMP_TYPE" = "minor" ]; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"

          # Update version.txt
          echo $NEW_VERSION > version.txt

          # Update package.json version (for PM2 status display)
          sed -i "s/\"version\": \".*\"/\"version\": \"$NEW_VERSION\"/" package.json

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "old_version=$CURRENT" >> $GITHUB_OUTPUT
          echo "✅ Bumped: $CURRENT → $NEW_VERSION ($BUMP_TYPE)"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.txt package.json
          git commit -m "release: v${{ steps.version.outputs.new_version }} (${{ github.event.inputs.bump_type }} bump) [skip ci]"
          git tag "v${{ steps.version.outputs.new_version }}"
          git push
          git push --tags

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/telegram-scraper
            git pull origin main
            pip install -r requirements.txt --break-system-packages
            pm2 delete telegram-scraper 2>/dev/null || true
            pm2 start ecosystem.config.js --env production
            pm2 save
            echo ""
            echo "=========================================="
            echo "  ✅ Deployed v${{ steps.version.outputs.new_version }}"
            echo "  📦 Bump: ${{ github.event.inputs.bump_type }}"
            echo "  🔄 Was: v${{ steps.version.outputs.old_version }}"
            echo "=========================================="
